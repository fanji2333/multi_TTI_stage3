defaults:
  # seed for random number generator
  seed: 0
  # training configurations
  train_cfgs:
    # device to use for training, options: cpu, cuda, cuda:0, cuda:0,1, etc.
    device: cuda:0
    # number of threads for torch
    torch_threads: 16
    # number of vectorized environments
    vector_env_nums: 1
    # number of parallel agent, similar to a3c
    parallel: 1
    # total number of steps to train
#    total_steps: 10000000
    epochs: 1200
  # algorithm configurations
  algo_cfgs:
    # number of steps to update the policy
    steps_per_epoch: 500
    # number of iterations to update the policy
    update_iters: 20
    # batch size for each iteration
    batch_size: 100
    # target kl divergence
    target_kl: 0.05
    # entropy coefficient
    entropy_coef: 0.0
    # early stop when kl divergence is bigger than target kl
    kl_early_stop: True
    # use max gradient norm
    use_max_grad_norm: True
    # max gradient norm
    max_grad_norm: 40.0
    # use critic norm
    use_critic_norm: True
    # critic norm coefficient
    critic_norm_coef: 0.001
    # reward discount factor
    gamma: 0.99
    # cost discount factor
    cost_gamma: 0.99
    # lambda for gae
    lam: 0.95
    # lambda for cost gae
    lam_c: 0.95
    # clip ratio
    clip: 0.2
    # advantage estimation method, options: gae, retrace
    adv_estimation_method: gae
    # standardize reward advantage
    standardized_rew_adv: True
    # standardize cost advantage
    standardized_cost_adv: True
    # penalty coefficient
    penalty_coef: 0.0
    # use cost
    use_cost: True
  # logger configurations
  logger_cfgs:
    # use wandb for logging
    use_wandb: False
    # wandb project name
    wandb_project: omnisafe
    # use tensorboard for logging
    use_tensorboard: True
    # save model frequency
    save_model_freq: 100
    # save logger path
    log_dir: "./runs"
    # save model path
    window_lens: 100
  # model configurations
  model_cfgs:
    # weight initialization mode
    weight_initialization_mode: "kaiming_uniform"
    # actor type, options: gaussian, gaussian_learning
    actor_type: gaussian_learning
    # linear learning rate decay
    linear_lr_decay: True
    # exploration noise anneal
    exploration_noise_anneal: False
    # std upper bound, and lower bound
    std_range: [0.5, 0.05]
    # actor network configurations
    actor:
      # hidden layer sizes
      hidden_sizes: [64, 64]
      # activation function
      activation: tanh
      # out_activation: tanh
      # learning rate
      lr: 0.0003
    critic:
      # hidden layer sizes
      hidden_sizes: [64, 64]
      # activation function
      activation: tanh
      # learning rate
      lr: 0.0003
  # lagrangian configurations
  lagrange_cfgs:
    # Tolerance of constraint violation
    cost_limit: 0
    # Initial value of lagrangian multiplier
    lagrangian_multiplier_init: 0.001
    # Learning rate of lagrangian multiplier
    lambda_lr: 0.01
    # Type of lagrangian optimizer
    lambda_optimizer: "Adam"
  # env configurations
  env_cfgs:
    # 配置系统参数
    B: 9                        # AP数量
    Antenna: 4                  # AP天线数量
    U: 8                         # 用户数量
    Bw: 30                       # 单个子载波带宽(kHz)
    Bw_tot: 10                   # 总带宽(MHz)
    K: 27                         # PRB数
    C: 12                         # 每个PRB上的子载波数
    N: 14                        # 每个时隙的OFDM符号数
    t_slot: 0.5                   # 单时隙长度(ms)
#    T: 10                        # 考虑的时隙数量
#    dP: 0.002                     # 功率分配粒度
    # 信道模型参数
#    d0: 0.392                    # 大尺度衰落参考距离
#    alpha: 4                     # 大尺度衰落路损因子
#    sigma_1: 3                   # 噪声功率，科学计数法的实数部分
#    sigma_2: 12                  # 噪声功率，科学计数法的负指数部分
    fc: 3500                      # 中心频率(MHz)
    d0: 31.84                        # 大尺度衰落模型参数
    d1: 21.5
    d2: 19
    sigma_sh: 8                   # shadow fading(dB)
    delta_sh: 0.5                 # shadow fading参数
    noise: -174                   # 噪声功率(dBm/Hz)
    noise_figure: 8               # dB
    # 以随机方式初始化系统中AP和用户位置
    region_bound: 600            # 所考虑区域大小
    min_distance_AP: 10          # AP间最小间距
    min_distance_User: 20         # 用户间最小间距
    # 设置用户参数
    Users_D: 2                           # 用户最大时延要求
    # 用户数据包到达率(考虑平均1ms到达1个包，则0.5ms到达0.5个包；再考虑用户并发n个流，最终到达率为0.5n，n取值在1到8之间)
    Users_ArriveRate: 6
    Users_PacketSize: [32, 50, 200]             # 用户数据包大小，取三种典型值之一
    Users_Req: 4                                # 用户时延满足率要求(小数点后9的数量)
    Users_err: 0.0001                           # 用户数据块错误率
    Users_pos: [[61, 39], [48, 55], [86, 92], [112, 79], [68, 107]]
    h_U: 1.65                       # 用户高度
    # 设置AP参数
    max_P: 0                      # 每个AP所能承受的最大功率(dBm)
    h_AP: 15                        # AP高度
    # 是否简化AP与用户的配对
    simple_env: True
    # 是否在obs中增加最大时延信息
    obs_add_max_delay: True
    # normalize reward
    reward_normalize: False
    # normalize cost
    cost_normalize: False
    # normalize observation
    obs_normalize: True
